<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thông tin cập nhật</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
    }

    .ticker {
      background: #0a8f3d;
      color: white;
      overflow: hidden;
      white-space: nowrap;
      padding: 10px 0;
    }

    .ticker span {
      display: inline-block;
      padding-left: 100%;
      animation: ticker 20s linear infinite;
    }

    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      min-height: 450px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card h2 {
      margin: 0 0 10px;
    }

    .stats {
      font-size: 14px;
      margin-bottom: 10px;
      line-height: 1.6;
    }

    .news {
      flex: 1;
      font-size: 14px;
      line-height: 1.6;
      overflow-y: auto;
    }

    .btn {
      margin-top: 10px;
      padding: 8px 12px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #111;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<header>
  Thông tin cập nhật
</header>

<div class="ticker">
  <span id="breaking-news">Đang tải tin nóng...</span>
</div>

<div class="container">

  <div class="card">
    <h2>Tài chính</h2>
    <div class="stats" id="finance-stats"></div>
    <div class="news" id="finance"></div>
    <a class="btn" href="https://vnexpress.net/kinh-doanh" target="_blank">VNExpress</a>
  </div>

  <div class="card">
    <h2>Kinh tế</h2>
    <div class="stats" id="economy-stats"></div>
    <div class="news" id="economy"></div>
    <a class="btn" href="https://vnexpress.net/kinh-doanh" target="_blank">VNExpress</a>
  </div>

  <div class="card">
    <h2>Địa chính trị</h2>
    <div class="stats" id="geo-stats"></div>
    <div class="news" id="geo"></div>
    <a class="btn" href="https://vnexpress.net/the-gioi" target="_blank">VNExpress</a>
  </div>

</div>

<footer>
  Trang web được thiết kế bởi Nam ko Hề
</footer>

<script>
  function random(min, max) {
    return (Math.random() * (max - min) + min).toFixed(2);
  }

  function updateStats() {
    document.getElementById("finance-stats").innerHTML = `
      VNINDEX: ${random(1100, 1300)}<br>
      USD/VND: ${random(24000, 26000)}<br>
      Vàng: ${random(70, 85)} triệu/lượng
    `;

    document.getElementById("economy-stats").innerHTML = `
      GDP Growth: ${random(5, 8)} %<br>
      Lạm phát: ${random(2, 5)} %<br>
      Lãi suất: ${random(3, 7)} %
    `;

    document.getElementById("geo-stats").innerHTML = `
      Dầu Brent: ${random(70, 100)} USD<br>
      USD Index: ${random(95, 110)}<br>
      Căng thẳng: Trung bình
    `;
  }

  async function loadNews() {
    try {
      const res = await fetch("https://api.allorigins.win/raw?url=https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml");
      const data = await res.text();

      const parser = new DOMParser();
      const xml = parser.parseFromString(data, "text/xml");
      const items = xml.querySelectorAll("item");

      let financeHTML = "";
      let economyHTML = "";
      let geoHTML = "";
      let tickerText = "";

      items.forEach((item, index) => {
        const title = item.querySelector("title").textContent;

        if (index < 5) financeHTML += `<div>- ${title}</div>`;
        else if (index < 10) economyHTML += `<div>- ${title}</div>`;
        else if (index < 15) geoHTML += `<div>- ${title}</div>`;

        if (index < 10) tickerText += title + " | ";
      });

      document.getElementById("finance").innerHTML = financeHTML;
      document.getElementById("economy").innerHTML = economyHTML;
      document.getElementById("geo").innerHTML = geoHTML;
      document.getElementById("breaking-news").textContent = tickerText;

    } catch (err) {
      console.error(err);
    }
  }

  function refreshAll() {
    updateStats();
    loadNews();
  }

  refreshAll();
  setInterval(refreshAll, 60000);
</script>

</body>
</html>
