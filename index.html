<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trung tâm chiến lược</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body { margin:0; font-family:'Inter',sans-serif; background:#f1f3f6; }

    header { text-align:center; padding:30px; background:white; }
    header h1 { margin:0; font-size:32px; }
    header p { color:#555; }

    .ticker { background:#111; color:#fff; padding:10px; }

    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(350px,1fr)); gap:20px; padding:20px; }

    .panel { border-radius:14px; overflow:hidden; box-shadow:0 6px 15px rgba(0,0,0,0.08); background:white; }

    .panel-header { padding:12px 16px; color:white; font-weight:600; }
    .blue{background:#1f5fae;} .red{background:#c51616;} .green{background:#0c6b2f;}

    .panel-body { padding:16px; }

    footer { text-align:center; padding:15px; background:#111; color:white; }
  </style>
</head>
<body>

<header>
  <h1>🏛️ TRUNG TÂM CHIẾN LƯỢC BẢO NAM</h1>
  <p>Hệ thống Terminal: Địa chính trị & Kinh tế Việt Nam</p>
</header>

<div class="ticker">
  Live Market Data - TradingView
</div>

<div class="grid">

  <!-- VĨ MÔ -->
  <div class="panel">
    <div class="panel-header blue">📊 CHỈ SỐ VĨ MÔ</div>
    <div class="panel-body">

      <!-- TradingView Widget BEGIN -->
      <div class="tradingview-widget-container">
        <div id="tv-forex"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
          new TradingView.widget({
            "width": "100%",
            "height": 300,
            "symbol": "FX_IDC:USDVND",
            "interval": "D",
            "timezone": "Asia/Ho_Chi_Minh",
            "theme": "light",
            "style": "1",
            "locale": "vi",
            "container_id": "tv-forex"
          });
        </script>
      </div>
      <!-- TradingView Widget END -->

    </div>
  </div>

  <!-- ĐỊA CHÍNH TRỊ -->
  <div class="panel">
    <div class="panel-header red">🌍 ĐỊA CHÍNH TRỊ</div>
    <div class="panel-body">

      <div class="tradingview-widget-container">
        <div id="tv-oil"></div>
        <script type="text/javascript">
          new TradingView.widget({
            "width": "100%",
            "height": 300,
            "symbol": "TVC:UKOIL",
            "interval": "D",
            "timezone": "Asia/Ho_Chi_Minh",
            "theme": "light",
            "style": "1",
            "locale": "vi",
            "container_id": "tv-oil"
          });
        </script>
      </div>

      <div class="tradingview-widget-container" style="margin-top:10px">
        <div id="tv-gold"></div>
        <script type="text/javascript">
          new TradingView.widget({
            "width": "100%",
            "height": 300,
            "symbol": "OANDA:XAUUSD",
            "interval": "D",
            "timezone": "Asia/Ho_Chi_Minh",
            "theme": "light",
            "style": "1",
            "locale": "vi",
            "container_id": "tv-gold"
          });
        </script>
      </div>

    </div>
  </div>

  <!-- VIỆT NAM -->
  <div class="panel">
    <div class="panel-header green">⚖️ THỊ TRƯỜNG VIỆT NAM</div>
    <div class="panel-body">

      <div class="tradingview-widget-container">
        <div id="tv-vn"></div>
        <script type="text/javascript">
          new TradingView.widget({
            "width": "100%",
            "height": 300,
            "symbol": "INDEX:VNINDEX",
            "interval": "D",
            "timezone": "Asia/Ho_Chi_Minh",
            "theme": "light",
            "style": "1",
            "locale": "vi",
            "container_id": "tv-vn"
          });
        </script>
      </div>

    </div>
  </div>

</div>

<footer>
  Trang web được thiết kế bởi Nam ko Hề
</footer>

</body>
</html>
