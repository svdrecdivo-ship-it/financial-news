<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thông tin thời gian thực</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      margin: 0;
      padding: 0;
    }
    header {
      background: #333;
      color: #fff;
      padding: 15px;
      text-align: center;
    }
    .container {
      display: flex;
      justify-content: space-around;
      margin: 20px;
    }
    .box {
      background: #fff;
      border: 1px solid #ccc;
      width: 30%;
      height: 300px; /* nhiều mảng trống để sau này thêm nội dung */
      padding: 10px;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
    }
    .box h2 {
      text-align: center;
    }
    .buttons {
      text-align: center;
      margin: 20px;
    }
    .buttons a {
      margin: 0 10px;
      padding: 10px 20px;
      background: #0073e6;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }
    .ticker {
      background: #0073e6;
      color: #fff;
      padding: 10px;
      overflow: hidden;
      white-space: nowrap;
    }
    .ticker span {
      display: inline-block;
      padding-left: 100%;
      animation: ticker 15s linear infinite;
    }
    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
  </style>
</head>
<body>
  <header>
    <h1>Thông tin thời gian thực</h1>
  </header>

  <div class="container">
    <div class="box">
      <h2>Tài chính</h2>
      <!-- Nội dung cập nhật thời gian thực sẽ được thêm bằng JS/API -->
    </div>
    <div class="box">
      <h2>Kinh tế</h2>
      <!-- Nội dung cập nhật thời gian thực -->
    </div>
    <div class="box">
      <h2>Địa chính trị</h2>
      <!-- Nội dung cập nhật thời gian thực -->
    </div>
  </div>

  <div class="buttons">
    <a href="https://vnexpress.net/kinh-doanh" target="_blank">Tài chính - Kinh tế</a>
    <a href="https://vnexpress.net/the-gioi" target="_blank">Địa chính trị</a>
  </div>

  <div class="ticker">
    <span>Tin nóng: VNExpress cập nhật liên tục... | Thị trường chứng khoán biến động... | Tình hình quốc tế mới nhất...</span>
  </div>
</body>
</html>
